default:
    interruptible: true
variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
    DOCKER_HOST: tcp://docker:2375/
    SERVICE_NAME: meity-cookie-manager-backend-service
    SERVICE_VERSION: '1.0.0'
    IMAGE_VERSION: $CI_COMMIT_SHA

stages:
    - static_code_analysis
    - data_capture
    # - semantic-tagging
    - lint-checks
    - test
    - build

lint:
    stage: lint-checks
    image: node:22-alpine
    script:
        - apk add --no-cache git
        - npm install eslint --save-dev
        - npx eslint . --ignore-pattern 'static/*'

include:
    # Semantic Tagg
    # - component: code.idfy.com/code/internal-tools/docker-build-ci-pipeline/versioning@v3.5.4
    #   inputs:
    #     stage: semantic-tagging
    #     prod_branch: "master"
    #     feature_release_branches: ["develop"]

    # Static code analysis
    # - component: code.idfy.com/code/internal-tools/node-ci-pipeline/lint@v2.3.3
    #   inputs:
    #     job: lint
    #     stage: static_code_analysis
    #     image_tag: $IMAGE_TAG
    - component: code.idfy.com/code/internal-tools/node-ci-pipeline/audit@v2.3.3
      inputs:
          job: audit
          stage: static_code_analysis
          image_tag: 20-bullseye-slim-gcloud-1.0
    - component: code.idfy.com/code/internal-tools/node-ci-pipeline/security@v2.3.3
      inputs:
          job: security
          stage: static_code_analysis
          image_tag: 3.9-slim-bullseye-gcloud-1.0
          service_branch: $CI_COMMIT_BRANCH
          commit_hash: $CI_COMMIT_SHA
          service_name: $SERVICE_NAME
          service_version: $SERVICE_VERSION

    # Data Capture
    - component: code.idfy.com/code/internal-tools/node-ci-pipeline/dependencies@v2.3.3
      inputs:
          job: dependencies
          stage: data_capture
          image_tag: 20-bullseye-slim-gcloud-1.0
          service_branch: $CI_COMMIT_BRANCH
          commit_hash: $CI_COMMIT_SHA
          service_name: $SERVICE_NAME
          service_version: $SERVICE_VERSION

    # Build
    - component: code.idfy.com/code/internal-tools/docker-build-ci-pipeline/build@v3.6.0
      inputs:
          job: build
          path: Dockerfile
          stage: build
          service: $SERVICE_NAME
          build-image-version: $IMAGE_VERSION
          context: .
          run: on_success

.build_branch:
    only:
        variables:
            - $CI_COMMIT_BRANCH =~ /^(develop|master)$/
    except:
        variables:
            - $CI_COMMIT_MESSAGE =~ /\[skip[ _-]deploy?\]|WIP/i
